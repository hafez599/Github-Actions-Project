# Copy this file to `.github/workflows/09-final-assessment-cd.yml`
# when you start EX-12.
#
# This starter is intentionally incomplete.
# It is meant to guide your thinking, not to run successfully as-is.
#
# Assessment target for this workflow:
# - run after trusted code reaches `main`
# - build one exact release image
# - push it to the registry
# - deploy it to the remote Linux host over SSH
# - validate what is running
#
# Keep the course story visible:
# package -> deliver
name: 09 Final Assessment CD

# This workflow runs only after trusted code reaches `main` via a closed and merged PR.
on:
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  IMAGE_NAME: tiny-health-app
  APP_PORT: "8000"
  # Keep one exact image name for the whole assessment.
  # The tag will change per run, but the image name should stay stable.

jobs:
  build-and-push:
    name: Build and push release image
    # Only execute if the pull request was actually merged into main (not closed/discarded)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    outputs:
      image_tag: "${{ steps.image-tag.outputs.value }}"
      image_ref: "${{ steps.image-ref.outputs.value }}"

    steps:
      # Step 1: Confirm required secrets exist and fail clearly if any are missing
      - name: Check required GitHub secrets
        env:
          REGISTRY_HOST: ${{ secrets.ECR_REGISTRY }}
          REPO_NAME: ${{ secrets.ECR_REPOSITORY }}
          DEPLOY_HOST: ${{ secrets.EC2_HOST }}
          DEPLOY_USER: ${{ secrets.EC2_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION_KEY: ${{ secrets.AWS_REGION }}
        run: |
          for var in REGISTRY_HOST REPO_NAME DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY AWS_ACCESS_KEY AWS_SECRET_KEY AWS_REGION_KEY; do
            if [ -z "${!var}" ]; then
              echo "Error: Required environment variable $var is missing."
              exit 1
            fi
          done
          echo "All required secrets are validated."

      # Step 2: Check out the code
      - name: Check out repository
        uses: actions/checkout@v4

      # Step 3: Create one traceable image tag
      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "value=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # Step 4: Create the full image reference using your ECR host and repository secrets
      - name: Create full image reference
        id: image-ref
        env:
          REGISTRY_HOST: ${{ secrets.ECR_REGISTRY }}
          REPO_NAME: ${{ secrets.ECR_REPOSITORY }}
        run: |
          echo "value=$REGISTRY_HOST/$REPO_NAME:${{ steps.image-tag.outputs.value }}" >> "$GITHUB_OUTPUT"

      # Step 5: Prepare Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 6: Log in to the registry via AWS configuration tools
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 7: Show the image reference in logs
      - name: Show image reference
        run: |
          echo "Target Registry Image: ${{ steps.image-ref.outputs.value }}"

      # Step 8: Build and push the release image using Buildx
      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image-ref.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-host:
    name: Deploy to remote host
    needs:
      - build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy image over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REGISTRY_HOST: ${{ secrets.ECR_REGISTRY }}
          REPO_NAME: ${{ secrets.ECR_REPOSITORY }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION_KEY: ${{ secrets.AWS_REGION }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
          COMMIT_SHA: ${{ github.sha }}
          APP_PORT: ${{ env.APP_PORT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REGISTRY_HOST,REPO_NAME,AWS_ACCESS_KEY,AWS_SECRET_KEY,AWS_REGION_KEY,IMAGE_TAG,IMAGE_REF,COMMIT_SHA,APP_PORT
          script_stop: true
          script: |
            echo "=== Step 1: Confirming Docker installation ==="
            if ! command -v docker &> /dev/null; then
              echo "Error: Docker is not installed on the remote host."
              exit 1
            fi

            echo "=== Step 2 & 3: Logging into ECR Registry from Remote Host ==="
            export AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY"
            export AWS_SECRET_ACCESS_KEY="$AWS_SECRET_KEY"
            export AWS_DEFAULT_REGION="$AWS_REGION_KEY"
            
            aws ecr get-login-password --region $AWS_REGION_KEY | docker login --username AWS --password-stdin $REGISTRY_HOST

            echo "=== Step 4: Pulling exact image reference ==="
            docker pull $IMAGE_REF

            echo "=== Step 5 & 6: Replacing container safely & injecting envs ==="
            if [ "$(docker ps -aq -f name=tiny-health-app)" ]; then
                echo "Stopping and removing existing container..."
                docker stop tiny-health-app
                docker rm tiny-health-app
            fi

            docker run -d \
              --name tiny-health-app \
              -p ${APP_PORT}:${APP_PORT} \
              -e APP_ENV="production" \
              -e APP_VERSION="${IMAGE_TAG}" \
              -e COMMIT_SHA="${COMMIT_SHA}" \
              -e DEPLOYED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
              -e IMAGE_TAG="${IMAGE_TAG}" \
              -e DEPLOY_MODE="CD_Pipeline" \
              --restart unless-stopped \
              $IMAGE_REF

            echo "=== Step 7: Waiting for /health check locally on host ==="
            echo "Allowing container startup time..."
            sleep 5
            
            for i in {1..10}; do
              if curl -s -f http://127.0.0.1:${APP_PORT}/health > /dev/null; then
                echo "Local health check passed successfully!"
                break
              fi
              echo "Waiting for application to boot... attempt $i/10"
              sleep 3
            done

            echo "=== Verifying /version and /status endpoints ==="
            echo "Version info:"
            curl -s http://127.0.0.1:${APP_PORT}/version || echo "Warning: /version endpoint not responding"
            echo -e "\nStatus info:"
            curl -s http://127.0.0.1:${APP_PORT}/status || echo "Warning: /status endpoint not responding"

      - name: Validate deployed app from GitHub Actions
        env:
          DEPLOY_HOST: ${{ secrets.EC2_HOST }}
          APP_PORT: ${{ env.APP_PORT }}
        run: |
          echo "=== Step 8: Remote Validation from GitHub Runner ==="
          BASE_URL="http://${DEPLOY_HOST}:${APP_PORT}"
          
          echo "Testing external /health endpoint..."
          curl -s --fail --max-time 5 "${BASE_URL}/health"
          
          echo -e "\nTesting external /version endpoint..."
          curl -s --fail --max-time 5 "${BASE_URL}/version"
          
          echo -e "\nTesting external /status endpoint..."
          curl -s --fail --max-time 5 "${BASE_URL}/status"
          
          echo -e "\nDeployment successfully validated externally!"
