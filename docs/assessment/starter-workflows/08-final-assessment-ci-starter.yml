# Copy this file to `.github/workflows/08-final-assessment-ci.yml`
# when you start EX-12.
#
# This starter is intentionally incomplete.
# It is meant to guide your thinking, not to run successfully as-is.
#
# Assessment target for this workflow:
# - run on pull requests to `main`
# - become the required status check before merge
# - verify, lint, and scan the app before delivery is allowed
#
# Keep the course story visible:
# code -> verify
#
# Keep this workflow intentionally simple.
# Do not add `fail-fast`, matrix strategy, or extra control logic here unless your instructor asks for it.
name: 08 Final Assessment CI

# TODO:
# Add the trigger block yourself.
# This workflow should run for pull requests targeting `main`.
# Make sure it reacts to normal pull request updates too.
on:
  pull_request:
    branches:
      - main
    types:
      - reopened
      - opened

env:
  PR_SCAN_IMAGE: tiny-health-app:pr-scan

jobs:
  verify:
    name: CI quality gate
    runs-on: ubuntu-latest
    # This job should become the required status check on `main`.
    # Keep the visible job name stable after your first successful run.
    # That stable visible name is what branch protection should require later.
    #
    # Build order for this job:
    # 1. check out the code
    # 2. set up Python
    # 3. run tests
    # 4. run Ruff
    # 5. run Trivy filesystem scan
    # 6. run Trivy Dockerfile/config scan
    # 7. build one local image for CI scanning
    # 8. run Trivy image scan

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run Ruff linting
        uses: astral-sh/ruff-action@v3
        with:
          args: "check . --output-format=github"

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
        # TODO:
        # Step 5:
        # Add the Trivy inputs so this step scans the repository filesystem.
        # Keep it beginner-safe and visibility-focused:
        # - point the scan at the repository
        # - include the scanner types you want students to interpret
        # - choose a stable severity set
        # - decide whether findings should fail the workflow or stay visibility-only
        # Do not add policy files or advanced exceptions in this assessment version.

      - name: Run Trivy Dockerfile and config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
        # TODO:
        # Step 6:
        # Add the Trivy inputs so this step scans Dockerfile and config risk.
        # This should stay a config-style scan, not an image scan.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # TODO:
        # Step 7 prep:
        # add the Buildx setup action used earlier in the course.

      - name: Build local image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.PR_SCAN_IMAGE }}
        # TODO:
        # Step 7:
        # Add the build inputs so this step builds one local image for CI scanning only.
        # This image should:
        # - build from the current repository
        # - stay local on the runner
        # - use the PR_SCAN_IMAGE tag from env

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.PR_SCAN_IMAGE }}'   
          format: 'json'                           
          output: 'trivy-image-report.json'        
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy image report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          retention-days: 7
        # TODO:
        # Step 8:
        # Add the Trivy inputs so this step scans the built image from PR_SCAN_IMAGE.
        # Keep this one focused on image visibility before merge.

