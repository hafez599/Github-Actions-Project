name: 09 Final Assessment CD

on:
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  IMAGE_NAME: myapp
  APP_PORT: "8000"

jobs:
  build-and-push:
    name: Build and push release image
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    outputs:
      image_tag: "${{ steps.image-tag.outputs.value }}"
      image_ref: "${{ steps.image-ref.outputs.value }}"

    steps:
      - name: Check required GitHub secrets
        env:
          REGISTRY_HOST: ${{ secrets.ECR_REGISTRY }}
          REPO_NAME: ${{ secrets.ECR_REPOSITORY }}
          DEPLOY_HOST: ${{ secrets.EC2_HOST }}
          DEPLOY_USER: ${{ secrets.EC2_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION_KEY: ${{ secrets.AWS_REGION }}
        run: |
          for var in REGISTRY_HOST REPO_NAME DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY AWS_ACCESS_KEY AWS_SECRET_KEY AWS_REGION_KEY; do
            if [ -z "${!var}" ]; then
              echo "Error: Required secret for $var is missing."
              exit 1
            fi
          done
          echo "All required secrets are validated."

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create image tag
        id: image-tag
        run: |
          TAG="$(date -u +%Y-%m-%d)-${GITHUB_RUN_ID}"
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "DEBUG: image-tag step produced value=[$TAG]"

      - name: Create full image reference
        id: image-ref
        env:
          REGISTRY_HOST: ${{ secrets.ECR_REGISTRY }}
          REPO_NAME: ${{ secrets.ECR_REPOSITORY }}
        run: |
          echo "DEBUG: REGISTRY_HOST=[$REGISTRY_HOST]"
          echo "DEBUG: REPO_NAME=[$REPO_NAME]"
          echo "DEBUG: tag-from-prev-step=[${{ steps.image-tag.outputs.value }}]"
          REF="$REGISTRY_HOST/$REPO_NAME:${{ steps.image-tag.outputs.value }}"
          echo "DEBUG: REF=[$REF]"
          echo "value=$REF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Show image reference
        run: |
          echo "Target Registry Image: [${{ steps.image-ref.outputs.value }}]"

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image-ref.outputs.value }}

      - name: DEBUG job outputs at end of build job
        run: |
          echo "FINAL image_tag output=[${{ steps.image-tag.outputs.value }}]"
          echo "FINAL image_ref output=[${{ steps.image-ref.outputs.value }}]"

  deploy-to-host:
    name: Deploy to remote host
    needs:
      - build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Debug needs outputs
        run: |
          echo "DEBUG (deploy job) tag=[${{ needs.build-and-push.outputs.image_tag }}]"
          echo "DEBUG (deploy job) ref=[${{ needs.build-and-push.outputs.image_ref }}]"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get ECR login password
        id: ecr-password
        run: |
          echo "value=$(aws ecr get-login-password --region ${{ secrets.AWS_REGION }})" >> "$GITHUB_OUTPUT"

      - name: Deploy image over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REGISTRY_HOST: ${{ secrets.ECR_REGISTRY }}
          REGISTRY_PASSWORD: ${{ steps.ecr-password.outputs.value }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REGISTRY_HOST,REGISTRY_PASSWORD
          script: |
            set -e

            IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}"
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            COMMIT_SHA="${{ github.sha }}"
            APP_PORT="${{ env.APP_PORT }}"
            DEPLOYED_AT="${{ github.run_id }}"

            echo "DEBUG (remote script) IMAGE_REF=[$IMAGE_REF]"
            echo "DEBUG (remote script) IMAGE_TAG=[$IMAGE_TAG]"

            docker --version
            echo "$REGISTRY_PASSWORD" | docker login --username AWS --password-stdin "$REGISTRY_HOST"
            docker pull "$IMAGE_REF"
            docker rm -f "${{ env.IMAGE_NAME }}" || true

            docker run -d \
              --name "${{ env.IMAGE_NAME }}" \
              -p "${APP_PORT}:${APP_PORT}" \
              -e APP_ENV=production \
              -e APP_VERSION="$IMAGE_TAG" \
              -e COMMIT_SHA="$COMMIT_SHA" \
              -e DEPLOYED_AT="$DEPLOYED_AT" \
              -e IMAGE_TAG="$IMAGE_TAG" \
              -e DEPLOY_MODE=ci \
              "$IMAGE_REF"

            for i in {1..10}; do
              if curl -sf "http://127.0.0.1:${APP_PORT}/health"; then
                echo "Health check passed"
                break
              fi
              echo "Waiting for app to become healthy... ($i/10)"
              sleep 3
            done

            curl -sf "http://127.0.0.1:${APP_PORT}/version"
            curl -sf "http://127.0.0.1:${APP_PORT}/status"

      - name: Validate deployed app from GitHub Actions
        run: |
          BASE_URL="http://${{ secrets.EC2_HOST }}:${{ env.APP_PORT }}"
          for path in health version status; do
            echo "Checking $BASE_URL/$path"
            curl -sf "$BASE_URL/$path" || { echo "Validation failed for /$path"; exit 1; }
          done
