# Copy this file to `.github/workflows/09-final-assessment-cd.yml`
# when you start EX-12.
#
# Assessment target for this workflow:
# - run after trusted code reaches `main`
# - build one exact release image
# - push it to the registry
# - deploy it to the remote Linux host over SSH
# - validate what is running
#
# Keep the course story visible:
# package -> deliver
name: 09 Final Assessment CD

# This workflow runs only after trusted code reaches `main` via a closed and merged PR.
on:
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  IMAGE_NAME: tiny-health-app
  APP_PORT: "8000"
  # Keep one exact image name for the whole assessment.
  # The tag will change per run, but the image name should stay stable.

jobs:
  build-and-push:
    name: Build and push release image
    # Only execute if the pull request was actually merged into main (not closed/discarded)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    outputs:
      image_tag: "${{ steps.image-tag.outputs.value }}"
      image_ref: "${{ steps.image-ref.outputs.value }}"
    steps:
      # Step 1: Confirm required secrets exist and fail clearly if any are missing
      - name: Check required GitHub secrets
        env:
          REGISTRY_HOST: ${{ secrets.ECR_REGISTRY }}
          REPO_NAME: ${{ secrets.ECR_REPOSITORY }}
          DEPLOY_HOST: ${{ secrets.EC2_HOST }}
          DEPLOY_USER: ${{ secrets.EC2_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION_KEY: ${{ secrets.AWS_REGION }}
        run: |
          for var in REGISTRY_HOST REPO_NAME DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY AWS_ACCESS_KEY AWS_SECRET_KEY AWS_REGION_KEY; do
            if [ -z "${!var}" ]; then
              echo "Error: Required environment variable $var is missing."
              exit 1
            fi
          done
          echo "All required secrets are validated."

      # Step 2: Check out the code
      - name: Check out repository
        uses: actions/checkout@v4

      # Step 3: Create one traceable image tag
      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "value=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # Step 4: Create the full image reference using your ECR host and repository secrets
      - name: Create full image reference
        id: image-ref
        env:
          REGISTRY_HOST: ${{ secrets.ECR_REGISTRY }}
          REPO_NAME: ${{ secrets.ECR_REPOSITORY }}
        run: |
          REF="$REGISTRY_HOST/$IMAGE_NAME:${{ steps.image-tag.outputs.value }}"
          echo "value=$REF" >> "$GITHUB_OUTPUT"

      # Step 5: Prepare Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 6: Log in to the registry via AWS configuration tools
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 7: Show the image reference in logs
      - name: Show image reference
        run: |
          echo "Target Registry Image: ${{ steps.image-ref.outputs.value }}"

      # Step 8: Build and push the release image using Buildx
      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image-ref.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-host:
    name: Deploy to remote host
    needs:
      - build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get ECR login password
        id: ecr-password
        run: |
          echo "value=$(aws ecr get-login-password --region ${{ secrets.AWS_REGION }})" >> "$GITHUB_OUTPUT"

      - name: Deploy image over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REGISTRY_HOST: ${{ secrets.ECR_REGISTRY }}
          REGISTRY_PASSWORD: ${{ steps.ecr-password.outputs.value }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
          COMMIT_SHA: ${{ github.sha }}
          APP_PORT: ${{ env.APP_PORT }}
          DEPLOYED_AT: ${{ github.run_id }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REGISTRY_HOST,REGISTRY_PASSWORD,IMAGE_TAG,IMAGE_REF,COMMIT_SHA,APP_PORT,DEPLOYED_AT
          script: |
            set -e

            # 1. Confirm Docker exists
            docker --version

            # 2. Log in to ECR on the remote host using the token we generated
            echo "$REGISTRY_PASSWORD" | docker login --username AWS --password-stdin "$REGISTRY_HOST"

            # 3. Pull the exact image
            docker pull "$IMAGE_REF"

            # 4. Remove old container safely if it exists
            docker rm -f tiny-health-app || true

            # 5/6. Run the new container, passing env vars
            docker run -d \
              --name tiny-health-app \
              -p "${APP_PORT}:${APP_PORT}" \
              -e APP_ENV=production \
              -e APP_VERSION="$IMAGE_TAG" \
              -e COMMIT_SHA="$COMMIT_SHA" \
              -e DEPLOYED_AT="$DEPLOYED_AT" \
              -e IMAGE_TAG="$IMAGE_TAG" \
              -e DEPLOY_MODE=ci \
              "$IMAGE_REF"

            # 7. Wait for /health locally on the host
            for i in {1..10}; do
              if curl -sf "http://127.0.0.1:${APP_PORT}/health"; then
                echo "Health check passed"
                break
              fi
              echo "Waiting for app to become healthy... ($i/10)"
              sleep 3
            done

            # 8. Check /version and /status on the remote host
            curl -sf "http://127.0.0.1:${APP_PORT}/version"
            curl -sf "http://127.0.0.1:${APP_PORT}/status"

      - name: Validate deployed app from GitHub Actions
        run: |
          BASE_URL="http://${{ secrets.EC2_HOST }}:${{ env.APP_PORT }}"
          for path in health version status; do
            echo "Checking $BASE_URL/$path"
            curl -sf "$BASE_URL/$path" || { echo "Validation failed for /$path"; exit 1; }
          done
